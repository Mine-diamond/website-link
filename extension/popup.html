<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏到 Mine</title>
    <style>
        :root {
            color-scheme: light;
            --color-bg: #f5f5f5;
            --color-panel: rgba(255, 255, 255, 0.64);
            --color-card: rgba(255, 255, 255, 0.48);
            --color-card-hover: rgba(255, 255, 255, 0.76);
            --color-input: rgba(255, 255, 255, 0.68);
            --color-text: #1f1f1f;
            --color-text-muted: #666666;
            --color-border: rgba(0, 0, 0, 0.08);
            --color-accent: #0067c0;
            --color-accent-hover: #005a9e;
            --color-accent-wash: rgba(0, 103, 192, 0.14);
            --color-success: #107c10;
            --color-success-wash: rgba(16, 124, 16, 0.12);
            --color-error: #c42b1c;
            --color-error-wash: rgba(196, 43, 28, 0.12);
            --star-empty: rgba(31, 31, 31, 0.22);
            --star-filled: #d29200;
            --radius-panel: 16px;
            --radius-card: 12px;
            --radius-control: 10px;
            --radius-small: 8px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --focus-ring: 0 0 0 3px rgba(0, 103, 192, 0.18);
        }
        .icon {
            width: 1em;
            height: 1em;
            display: inline-block;
            flex: 0 0 auto;
            fill: currentColor;
            vertical-align: -0.14em;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
                --color-bg: #202020;
                --color-panel: rgba(40, 40, 40, 0.68);
                --color-card: rgba(255, 255, 255, 0.07);
                --color-card-hover: rgba(255, 255, 255, 0.12);
                --color-input: rgba(255, 255, 255, 0.08);
                --color-text: #f5f5f5;
                --color-text-muted: #a8a8a8;
                --color-border: rgba(255, 255, 255, 0.1);
                --color-accent: #4cc2ff;
                --color-accent-hover: #76d1ff;
                --color-accent-wash: rgba(76, 194, 255, 0.12);
                --color-success: #6ccb5f;
                --color-success-wash: rgba(108, 203, 95, 0.12);
                --color-error: #ff8a80;
                --color-error-wash: rgba(255, 138, 128, 0.12);
                --star-empty: rgba(255, 255, 255, 0.22);
                --star-filled: #ffd166;
                --focus-ring: 0 0 0 3px rgba(76, 194, 255, 0.18);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at 20% 0%, var(--color-accent-wash), transparent 42%),
                var(--color-bg);
            color: var(--color-text);
            font-size: 14px;
            width: 380px;
            min-height: 320px;
        }
        .container { padding: var(--space-lg); }
        h1 {
            font-size: 16px;
            font-weight: 650;
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            letter-spacing: -0.01em;
        }
        h1 .icon { color: var(--color-accent); }
        .form-group { margin-bottom: var(--space-sm); }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-muted);
            margin-bottom: var(--space-xs);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-control);
            background: var(--color-input);
            color: var(--color-text);
            font-size: 13px;
            outline: none;
            transition: background 120ms ease-out, border-color 120ms ease-out, box-shadow 120ms ease-out;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--color-accent);
            box-shadow: var(--focus-ring);
        }
        .form-group input[readonly] {
            color: var(--color-text-muted);
            cursor: default;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 50px;
            font-family: inherit;
        }
        .form-row {
            display: flex;
            gap: var(--space-sm);
        }
        .form-row .form-group { flex: 1; }

        .stars {
            display: flex;
            gap: var(--space-xs);
            padding: 4px 0;
        }
        .star-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-small);
            font-size: 20px;
            cursor: pointer;
            color: var(--star-empty);
            transition: color 120ms ease-out, background 120ms ease-out;
            padding: 0;
        }
        .star-btn .icon {
            width: 1em;
            height: 1em;
        }
        .star-btn.active,
        .star-btn:hover {
            color: var(--star-filled);
            background: rgba(249, 168, 37, 0.12);
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--color-accent);
            border-radius: var(--radius-control);
            background: var(--color-accent);
            color: white;
            font-size: 14px;
            font-weight: 650;
            cursor: pointer;
            transition: background 120ms ease-out, opacity 120ms ease-out;
            margin-top: var(--space-xs);
        }
        .btn-submit:hover {
            background: var(--color-accent-hover);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: var(--space-sm);
            padding: 8px 10px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-control);
            font-size: 13px;
            display: none;
        }
        .status.success { display: block; background: var(--color-success-wash); color: var(--color-success); }
        .status.error { display: block; background: var(--color-error-wash); color: var(--color-error); }
        .status.loading { display: block; color: var(--color-text-muted); text-align: center; background: var(--color-card); }

        .settings-toggle {
            margin-top: var(--space-md);
            text-align: center;
        }
        .settings-toggle button {
            background: transparent;
            border: 0;
            color: var(--color-text-muted);
            font-size: 11px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            border-radius: var(--radius-small);
            padding: 4px 6px;
        }
        .settings-toggle button:hover { background: var(--color-card-hover); color: var(--color-text); }
        .settings-panel {
            margin-top: var(--space-sm);
            padding: var(--space-sm);
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            display: none;
        }
        .settings-panel.open { display: block; }
        .settings-panel label { font-size: 11px; color: var(--color-text-muted); }
        .settings-panel input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-small);
            background: var(--color-input);
            color: var(--color-text);
            font-size: 12px;
            margin-top: 4px;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M6 4.75A2.75 2.75 0 0 1 8.75 2h6.5A2.75 2.75 0 0 1 18 4.75v16.1l-6-3.75-6 3.75V4.75Zm2.75-.75A.75.75 0 0 0 8 4.75v12.5l4-2.5 4 2.5V4.75a.75.75 0 0 0-.75-.75h-6.5Z"/></svg> 收藏到 Mine</h1>

        <div class="form-group">
            <label>标题</label>
            <input type="text" id="title" readonly>
        </div>

        <div class="form-group">
            <label>网址</label>
            <input type="text" id="url" readonly>
        </div>

        <div class="form-group">
            <label>标签（逗号分隔）</label>
            <input type="text" id="tags" placeholder="如: 前端, 工具">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>重要程度</label>
                <div class="stars" id="stars">
                    <button class="star-btn" data-value="1" aria-label="1星"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="m12 2.6 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.41l-5.8 3.05L7.31 14l-4.7-4.58 6.49-.94L12 2.6Z"/></svg></button>
                    <button class="star-btn" data-value="2" aria-label="2星"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="m12 2.6 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.41l-5.8 3.05L7.31 14l-4.7-4.58 6.49-.94L12 2.6Z"/></svg></button>
                    <button class="star-btn" data-value="3" aria-label="3星"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="m12 2.6 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.41l-5.8 3.05L7.31 14l-4.7-4.58 6.49-.94L12 2.6Z"/></svg></button>
                    <button class="star-btn" data-value="4" aria-label="4星"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="m12 2.6 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.41l-5.8 3.05L7.31 14l-4.7-4.58 6.49-.94L12 2.6Z"/></svg></button>
                    <button class="star-btn" data-value="5" aria-label="5星"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="m12 2.6 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.41l-5.8 3.05L7.31 14l-4.7-4.58 6.49-.94L12 2.6Z"/></svg></button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>备注</label>
            <textarea id="notes" placeholder="可选"></textarea>
        </div>

        <button class="btn-submit" id="submitBtn">收藏</button>

        <div class="status" id="status"></div>

        <div class="settings-toggle">
            <button id="settingsToggle"><svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65-2-3.46-2.49 1a7.34 7.34 0 0 0-1.69-.98L15 3h-4l-.36 2.93c-.6.24-1.17.57-1.69.98l-2.49-1-2 3.46 2.11 1.65c-.04.32-.07.65-.07.98s.02.66.07.98l-2.11 1.65 2 3.46 2.49-1c.52.41 1.09.74 1.69.98L11 21h4l.36-2.93c.6-.24 1.17-.57 1.69-.98l2.49 1 2-3.46-2.11-1.65ZM13 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/></svg> 设置 API 地址</button>
        </div>
        <div class="settings-panel" id="settingsPanel">
            <label>API 地址</label>
            <input type="text" id="apiUrl" placeholder="https://your-site.pages.dev">
            <label>API Token</label>
            <input type="password" id="apiToken" placeholder="可选 Bearer Token">
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
